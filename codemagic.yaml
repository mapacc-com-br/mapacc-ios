workflows:
  ios-mapacc:
    name: MapaCC iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 16.3
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: br.com.mapacc.app

    scripts:
      - name: Install pods
        script: |
          cd src
          pod install

      - name: Set up code signing
        script: |
          cd src
          xcode-project use-profiles

      - name: Create exportOptions.plist
        script: |
          cd src
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>6TQTTMXW8H</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>br.com.mapacc.app</key>
              <string>MapaCC App Store</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive iOS app
        script: |
          cd src
          xcodebuild archive \
            -workspace MapaCC.xcworkspace \
            -scheme MapaCC \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -archivePath build/ios/xcarchive/MapaCC.xcarchive \
            DEVELOPMENT_TEAM=6TQTTMXW8H \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="MapaCC App Store"

      - name: Export IPA
        script: |
          cd src
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/MapaCC.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist exportOptions.plist

    artifacts:
      - src/build/ios/ipa/*.ipa
      - src/build/ios/xcarchive/*.xcarchive
